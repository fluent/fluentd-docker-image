name: Windows
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Even though dropped from GitHub Actions, but LTSC2019 itself is still maintained
          # - version: v1.19
          #   os-version: 2019
          - version: v1.19
            os-version: 2022
    runs-on: windows-${{ matrix.os-version }}
    steps:
      - name: Set up Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: 3.4
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build
        run: |
          ridk enable
          make image DOCKERFILE=${{ matrix.version }}/windows-ltsc${{ matrix.os-version }} VERSION=test

name: Windows
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Even though dropped from GitHub Actions, but LTSC2019 itself is still maintained
          # - version: v1.19
          #   os-version: 2019
          - version: v1.19
            os-version: 2022
    runs-on: windows-${{ matrix.os-version }}
    steps:
      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1.320.0
        with:
          ruby-version: 3.4
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build
        run: |
          ridk enable
          make image DOCKERFILE=${{ matrix.version }}/windows-ltsc${{ matrix.os-version }} VERSION=test
